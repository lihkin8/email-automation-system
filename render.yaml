services:
  - type: web
    name: email-automation-backend
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: NEON_DB_URL
        sync: false
      - key: GMAIL_CREDENTIALS_PATH
        sync: false
      - key: TRACKING_PIXEL_BASE_URL
        sync: false
      - key: BASE_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: email-automation-resumes
